<html>

<head>
    <title>SRC Headless Benchmark Tool</title>
    <!-- <script src="https://code.jquery.com/jquery-3.6.1.slim.min.js"></script> -->
    <link href="css/styleSheet.css" rel="stylesheet" type="text/css">
    <!-- <link href="css/styleSheet.css" rel="stylesheet" type="text/css"> -->
    <!-- Replace next two lines if the less is not working in any browser. Rename the .less file with .css -->
    <link rel="stylesheet/less" type="text/css" href="css/styles.less" />

    <style>
        .json {
            border: 1px solid #ff0000;
        }
        .textarea,
        .jsoncontent {
            width: 49%;
            height: 400px;
            border: 1px solid #ff0000;
        }
    </style>
</head>

<body>
    <div class="flex">
        <select id="sdk_picker_v1"></select>
        <select id="sdk_picker_v2"></select>
        
        
        <label for="#emailInput">
            Email:
            <input id="emailInput" placeholder="Enter email address" value='senthilr@mailinator.com' />
        </label>
        <textarea class="textarea initInput jsoncontent" id="initInput"></textarea>
        <pre readonly class="out textarea isRegOutput" id="initOutput" ></pre>

        <textarea placeholder="No Input Required!" readonly="readonly" unselectable="on" class="textarea noselect" id="isRegInput"></textarea>
        <pre readonly class="out textarea isRegOutput" id="isRegOutput" ></pre>

    </div>
    <!-- 
    <input type="radio" name="rating" value="CreatePopup" onchange="openDcfWindow(this)"> Create Popup
    <input type="radio" name="rating" value="CreateIframe" onchange="openDcfWindow(this)"> Create Iframe
 -->
    <div class="main">
        <textarea class="textarea jsoncontent idLookupInput" id="idLookupInput" onfocus="autoIdLookupEmailAddress()"></textarea>
        <pre readonly class="out textarea idLookupOutput" id="idLookupOutput" ></pre>
        <pre readonly class="out textarea initIdValidationOutput" id="initIdValidationOutput" ></pre>
        <textarea class="textarea jsoncontent completeIdValidationInput" id="completeIdValidationInput">
            {
                "validationData": "123456"
            }
        </textarea>
        <pre readonly class="out textarea completeIdValidationOutput" id="completeIdValidationOutput" ></pre>
        <textarea class="textarea getCustProfileInput" id="getCustProfileInput"></textarea>
        <pre readonly class="out textarea getCustProfileOutput" id="getCustProfileOutput" ></pre>

        <input type="checkbox" id="SrciWindowCheckbox" value="SrciWindow" />Launch DCF in SRC-i popup window
        <input type="checkbox" id="SrciIframeCheckbox" value="SrciWindow" />Launch DCF in SRC-i iframe window

        <button class="buttonLink" id="fillSelectCardInfoButton" onClick="appendComplianceSettings()">Append ComplianceSettings</button>
        <textarea class="textarea jsoncontent selectCardInput" id="selectCardInput"></textarea>
        <pre readonly class="out textarea selectCardOutput" id="selectCardOutput" ></pre>

        <textarea class="textarea jsoncontent selectCardInput" id="unBindInput"></textarea>
        <pre readonly class="out textarea selectCardOutput" id="unBindOutput" ></pre>


        <!-- Dynamically load script based on user selection -->
        <script async src="js/driver-perf.js" type="module"></script>
        <!-- <script async src="js/getOTP.js" type="module"></script> -->

        <script>
          
            function openDcfWindow(element) {
                if(element.value == 'CreateIframe') {
                    dcfiframe = document.createElement('iframe');
                    dcfiframe.src = 'dummyLoader.html';
                    dcfiframe.setAttribute('id','dcf_iframe');
                    document.body.appendChild(dcfiframe);
                    if(newPopupRef) {newPopupRef.close()};
                } else if(element.value == 'CreatePopup') {
                    newPopupRef = window.open('dummyLoader.html', 'DCF', 'height=600,width=400');
                    window.focus();
                    newPopupRef.blur();
                    if(dcfiframe) {
                        document.body.removeChild(document.getElementById("dcf_iframe"));
                    }
                }
            }
        </script>
    </body>

</html>
